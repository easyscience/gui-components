<!doctype html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <!-- <script src="https://cdn.plot.ly/plotly-latest.min.js"></script> -->
    <script src="plotly-2.18.0.min.js"></script>

    <style type="text/css">
      :root {
        --fontPixelSize: 14;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        overflow: hidden;
        font-size: calc(var(--fontPixelSize) * 1px);
      }

      #plotContainer {
        height: 100%;
        width: 100%;
        padding: calc(var(--fontPixelSize) * 1px);
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
      }

      #plotDiv {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <div id="plotContainer">
      <div id="plotDiv"></div>
    </div>

    <script>
      ///////
      // Data
      ///////

      // Default data
      let angles = [45, 90, 135, 180, 225, 270, 315, 360]
      let data = {
        x: [
          angles.map((angle) => Math.sin(angle * (Math.PI / 180))),
          angles.map((angle) => Math.sin(angle * (Math.PI / 180))),
        ],
        y: [
          angles.map((angle) => Math.cos(angle * (Math.PI / 180))),
          angles.map((angle) => Math.cos(angle * (Math.PI / 180))),
        ],
        z: [Array(angles.length).fill(1), Array(angles.length).fill(2)],
        surfaceColor: [
          Array(angles.length).fill(0.5),
          Array(angles.length).fill(1.5),
        ],
      }

      /////////
      // Plotly
      /////////

      // Default trace
      let trace = {
        name: '',
        x: data.x,
        y: data.y,
        z: data.z,
        customdata: [],
        hovertemplate: '',
        surfacecolor: data.surfaceColor,
        type: 'surface',
        colorscale: 'Portland',
        colorbar: { title: { text: '' } },
      }

      // Rectangular patch trace
      let patchTrace = {
        name: '',
        type: 'scatter3d',
        mode: 'lines',
        x: [],
        y: [],
        z: [],
        line: {
          color: 'black',
          width: 4,
          dash: 'dash',
        },
        hoverinfo: 'skip',
      }

      // Plot dataset
      let plotTraces = [trace, patchTrace]

      // Plot layout
      let plotLayout = {
        scene: {
          xaxis: { title: 'x-axis' },
          yaxis: { title: 'y-axis' },
          zaxis: { title: 'z-axis' },
        },
      }

      // Plot config
      let plotConfig = {
        displayModeBar: true,
        displaylogo: false,
      }

      // Create plot
      Plotly.newPlot('plotDiv', plotTraces, plotLayout, plotConfig)

      /////////////////////////////////////////
      // Functionality to be accesable from QML
      /////////////////////////////////////////

      function redrawPlot() {
        Plotly.redraw('plotDiv')
      }

      function setColorbarTitle(newTitle) {
        trace.colorbar.title.text = newTitle
      }

      function setScene(newScene) {
        plotLayout.scene = newScene
      }

      function setXyzData(newData) {
        trace.x = newData.x
        trace.y = newData.y
        trace.z = newData.z
        trace.surfacecolor = newData.surfaceColor
        trace.customdata = newData.customData
        trace.hovertemplate = newData.hoverTemplate
      }

      function setPatchData(newData) {
        patchTrace.x = newData.x
        patchTrace.y = newData.y
        patchTrace.z = newData.z
      }

      function getDataFromJson(filename) {
        let request = new XMLHttpRequest()
        request.open('GET', filename, false)
        request.send(null)
        let data = JSON.parse(request.responseText)
        return data
      }
    </script>
  </body>
</html>
